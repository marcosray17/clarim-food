<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>Clarim Food</title>
</head>

<body>
    <main class="container">
        <section class="top">
            <div class="header">
                <h1>Bem-vindo ao</h1>
                <h1 class="title">Clarim Food</h1>
                <span>Entre para aproveitar o melhor açai e sorvete da região.Uma experiência deliciosa com um design
                    moderno.
                </span>
                <img src="https://t4.ftcdn.net/jpg/04/20/15/39/360_F_420153957_n1aTrnGc7vXTwZKpR4Bn5WjvqI8KVTw8.jpg"
                    class="image">

            </div>
        </section>
        <section class="login">

            <form class="form-login">
                <div class="card-login">
                    <h2>Clarim</h2>
                    <h2 class="card-title">Food</h2>

                    <span>Faça login para continuar</span>
                    <div class="email">
                        <label>Email</label>
                        <input type="email" placeholder="Digite seu email" required>
                    </div>
                    <div class="password">
                        <label>Senha</label>
                        <input type="password" placeholder="Digite sua senha" required>
                    </div>
                    <span>Esqueceu a senha?</span>
                    <button type="submit">Entrar</button>
                </div>
            </form>


        </section>
    </main>
</body>

</html>
