<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>Clarim Food</title>
</head>

<body>
    <main class="container">
        <section class="top">
            <div class="header">
                <h1 class="title1">Bem-vindo ao</h1>
                <h1 class="title2">Clarim Food</h1>
                <p>Entre para aproveitar o melhor açai e sorvete da região.Uma experiência deliciosa com um design
                    moderno.
                </p>
                <img src="imagens/carrinhoimg.png"
                    class="imagem">

            </div>
        </section>
        <section class="login">
            <div class="card-login">
                <form class="form-login">

                    <h2 class="card-title1">Clarim</h2>
                    <h2 class="card-title2">Food</h2>

                    <p>Faça login para continuar</p>
                    <div class="email">
                        <label>Email</label>
                        <input type="email" placeholder="Digite seu email" required>
                    </div>
                    <div class="password">
                        <label>Senha</label>
                        <input type="password" placeholder="Digite sua senha" required>
                    </div>
                    <p>Esqueceu a senha?</p>
                    <button type="submit" class="botao">Entrar</button>

                </form>
            </div>

        </section>
    </main>
</body>

</html>
